cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe Cobe Test</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    height: 100%;
    width: 100%;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cobe" style="width: 100vw; height: 100vh;" width="1000" height="1000"></canvas>

<!-- Cobe UMD via CDN -->
<script src="https://unpkg.com/cobe/dist/cobe.min.js"></script>

<script>
let phi = 0;
const canvas = document.getElementById("cobe");

// Coordonnées fixes pour tester
const testMarkers = [
  { location: [37.7749, -122.4194], size: 0.05, color: [1,0,0] }, // San Francisco
  { location: [48.8566, 2.3522], size: 0.05, color: [0,1,0] },     // Paris
];

const globe = Cobe.createGlobe(canvas, {
  devicePixelRatio: 2,
  width: 1000,
  height: 1000,
  phi: 0,
  theta: 0,
  dark: 0,
  diffuse: 1.2,
  scale: 1,
  mapSamples: 16000,
  mapBrightness: 6,
  baseColor: [0.3, 0.3, 0.3],
  markerColor: [1, 0.5, 1],
  glowColor: [1, 1, 1],
  markers: testMarkers,
  arcs: [],
  onRender: (state) => {
    state.phi = phi;
    phi += 0.01;
  }
});
</script>
</body>
</html>
EOF
