cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe Cobe Simple</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    width: 100%;
    height: 100%;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cobe" style="width: 100vw; height: 100vh;" width="1000" height="1000"></canvas>

<!-- Cobe UMD via CDN -->
<script src="https://unpkg.com/cobe/dist/cobe.min.js"></script>

<script>
let phi = 0;
const canvas = document.getElementById("cobe");

Cobe.createGlobe(canvas, {
  devicePixelRatio: 2,
  width: 1000,
  height: 1000,
  phi: 0,
  theta: 0,
  dark: 0,
  diffuse: 1.2,
  scale: 1,
  mapSamples: 16000,
  mapBrightness: 6,
  baseColor: [0.3, 0.3, 0.3],
  glowColor: [1, 1, 1],
  markers: [],  // aucun marker
  arcs: [],
  onRender: (state) => {
    state.phi = phi;
    phi += 0.01;
  }
});
</script>
</body>
</html>
EOF
